<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Send a message</title>
  <style>
    body {
      margin: 0;
    }

    .container {
      position: relative;
      width: 100%;
    }

    .container img {
      width: 100%;
      height: auto;
      display: block;
    }

    .container video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;

      opacity: 0;
      transition: opacity 2s ease;
    }

    .container video.show {
      opacity: 1;
    }
    
    footer {
      color: white;
      text-align: center;
      padding: 20px 10px;
      font-size: 16px;

      opacity: 0;
      transition: opacity 2s ease;
    }

    footer.show {
      opacity: 1;
    }
    
    html {
    background-color: #0e1112;
    }


  </style>
</head>
<body>

  <div class="container">

    <picture>
      <source srcset="mobile.jpg" media="(max-width: 780px)">
      <img src="desktop.png" alt="desktop">
    </picture>

    <video id="vid" autoplay muted loop playsinline>
      <source src="cyn1.mp4" type="video/mp4">
    </video>

  </div>
  
  <footer id="footer">
    <p>Aplil Fools from the r/MurderDrones mod team!</p>
    <p><a href="https://mdfanprojects.org">Site:</a> u/EmberGamingStudios</p>
    <p><a href="https://youtube.com/shorts/8TqzA-hbjeE">Video:</a> u/Im_not_an_expert_lol</p>
    <p>-</p>
    <p>Murder Drones is property of Glitch Productions</p>
    <p>Reddit is property of Reddit Inc.</p>
    <p>Never Gonna Give You Up is property of Rick Astley</p>
  </footer>

  <script>
    window.addEventListener("load", () => {
      const video = document.getElementById("vid");
      const footer = document.getElementById("footer");

      setTimeout(() => {
        video.play().catch(err => console.log("Video playback failed:", err));
        video.classList.add("show");
      }, 3000);

      setTimeout(() => {
        footer.classList.add("show");
      }, 5000);
    });
  </script>

</body>
</html>
